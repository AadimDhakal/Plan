<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flowchart Planner</title>
<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    background:#eee;
    font-family:sans-serif;
}
canvas{
    flex:1;
    background:#fff;
    touch-action:none;
}
div{
    display:flex;
}
button{
    flex:1;
    padding:12px;
    font-size:16px;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div>
    <button id="tool">Eraser</button>
    <button id="save">Save</button>
</div>

<script>
const c=document.getElementById("c"),
x=c.getContext("2d"),
tool=document.getElementById("tool"),
save=document.getElementById("save");

let erase=false;

function resize(){
    const img=x.getImageData(0,0,c.width,c.height);
    c.width=innerWidth;
    c.height=innerHeight-document.querySelector("div").offsetHeight;
    x.putImageData(img,0,0);
    x.lineCap="round";
    x.strokeStyle="#000";
}
resize();
addEventListener("resize",resize);

let draw=false,px,py;

function pos(e){
    const r=c.getBoundingClientRect();
    const t=e.touches?e.touches[0]:e;
    return[t.clientX-r.left,t.clientY-r.top];
}

function start(e){
    draw=true;
    [px,py]=pos(e);
}

function move(e){
    if(!draw)return;
    e.preventDefault();
    const[nx,ny]=pos(e);

    x.globalCompositeOperation=erase?"destination-out":"source-over";
    x.lineWidth=erase?18:2;

    x.beginPath();
    x.moveTo(px,py);
    x.lineTo(nx,ny);
    x.stroke();

    px=nx;
    py=ny;
}

function end(){
    draw=false;
}

c.onmousedown=start;
c.onmousemove=move;
window.onmouseup=end;

c.ontouchstart=start;
c.ontouchmove=move;
window.ontouchend=end;

tool.onclick=()=>{
    erase=!erase;
    tool.textContent=erase?"Pencil":"Eraser";
};

save.onclick=()=>{
    const a=document.createElement("a");
    a.href=c.toDataURL("image/png");
    a.download="flowchart.png";
    a.click();
};
</script>

</body>
</html>
